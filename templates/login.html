<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CyberRisk AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/">🛡️ Cyber<span>Risk AI</span></a>
    </nav>

    <div class="page-wrap" style="max-width:480px">
        <div class="page-heading">Welcome back</div>
        <div class="page-subheading">Sign in to your dashboard.</div>

        {% if error %}
        <div style="background:rgba(226,75,74,0.1);border:0.5px solid rgba(226,75,74,0.3);color:#F09595;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="card-section">
                <div class="field-group">
                    <label class="field-label">Email address</label>
                    <input type="email" class="field-input" name="email" placeholder="info@acmesolutions.co.uk" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Password</label>
                    <input type="password" class="field-input" name="password" placeholder="Your password" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Sign In →</button>
        </form>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,0.3)">
            No account yet? <a href="/register" style="color:#378ADD">Create one free</a>
        </div>
    </div>
</body>
</html>
