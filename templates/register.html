<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — CyberRisk AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/">🛡️ Cyber<span>Risk AI</span></a>
    </nav>

    <div class="page-wrap" style="max-width:480px">
        <div class="page-heading">Create your account</div>
        <div class="page-subheading">Start protecting your business today.</div>

        {% if error %}
        <div style="background:rgba(226,75,74,0.1);border:0.5px solid rgba(226,75,74,0.3);color:#F09595;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px">
            {{ error }}
        </div>
        {% endif %}

        <form action="/register" method="POST">
            <div class="card-section">
                <div class="field-group">
                    <label class="field-label">Company name</label>
                    <input type="text" class="field-input" name="company_name" placeholder="Acme Solutions Ltd" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Email address</label>
                    <input type="email" class="field-input" name="email" placeholder="info@acmesolutions.co.uk" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Industry</label>
                    <select class="field-input" name="industry">
                        <option value="Retail">Retail</option>
                        <option value="Finance">Finance</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Education">Education</option>
                        <option value="Hospitality">Hospitality</option>
                        <option value="Manufacturing">Manufacturing</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="field-row">
                    <div>
                        <label class="field-label">Employees</label>
                        <select class="field-input" name="employees">
                            <option value="1-10">1-10</option>
                            <option value="11-50">11-50</option>
                            <option value="51-200">51-200</option>
                            <option value="201-500">201-500</option>
                        </select>
                    </div>
                    <div>
                        <label class="field-label">Domain</label>
                        <input type="text" class="field-input" name="domain" placeholder="acmesolutions.co.uk">
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label">Password</label>
                    <input type="password" class="field-input" name="password" placeholder="Min 8 characters" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Create Account →</button>
        </form>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,0.3)">
            Already have an account? <a href="/login" style="color:#378ADD">Sign in</a>
        </div>
    </div>
</body>
</html>
