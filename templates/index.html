<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberRisk AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0f1e;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .badge-pill {
            background: rgba(55,138,221,0.15);
            border: 1px solid rgba(55,138,221,0.3);
            color: #85B7EB;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 52px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        h1 span {
            color: #378ADD;
        }
        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.7;
        }
        .btn-main {
            background: #185FA5;
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 10px;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-main:hover {
            background: #378ADD;
            color: white;
        }
        .stats {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 60px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-num {
            font-size: 32px;
            font-weight: 700;
            color: #378ADD;
        }
        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div>
            <div class="badge-pill">🛡️ AI-Powered Cybersecurity</div>
            <h1>Protect Your Business<br>from <span>Cyber Threats</span></h1>
            <p class="subtitle">
                Get a complete cybersecurity risk assessment in under 5 minutes. 
                AI-powered analysis built specifically for small businesses.
            </p>
            <a href="#" class="btn-main">Start Free Assessment →</a>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-num">500+</div>
                    <div class="stat-label">SMEs Protected</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">2 min</div>
                    <div class="stat-label">Average Assessment</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">99%</div>
                    <div class="stat-label">Accuracy Rate</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
